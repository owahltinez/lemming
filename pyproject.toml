[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lemming"
version = "0.1.0"
description = "An autonomous, iterative task runner for AI coding agents."
readme = "README.md"
authors = [
    { name = "Lemming Contributors" },
]
license = { text = "MIT" }
requires-python = ">=3.8"
keywords = ["ai", "agents", "automation", "gemini", "claude", "aider"]
dependencies = [
    "click>=8.0.0",
    "pyyaml>=6.0.3",
]

[project.scripts]
lemming = "lemming.main:cli"
