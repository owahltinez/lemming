<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemming · Task Log</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐹</text></svg>">
    <style id="mancha-cloak">
        html {
            background-color: #f9fafb; /* Gray 50 */
        }
        @media (prefers-color-scheme: dark) {
            html {
                background-color: #111827; /* Gray 900 for logs */
            }
        }
        body { opacity: 0 !important; }
    </style>
    <style>
        /* Loading indicator visible during cloaking */
        html.mancha-loading::after {
            content: 'Loading Logs...';
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: ui-sans-serif, system-ui, sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: #4f46e5; /* Indigo 600 */
            z-index: 9999;
            animation: mancha-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @media (prefers-color-scheme: dark) {
            html.mancha-loading::after {
                color: #818cf8; /* Indigo 400 */
            }
        }

        @keyframes mancha-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
    <script src="/static/mancha.js" css="utils"></script>
    <script src="/static/favicon.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-sans h-screen overflow-hidden">
    <div class="w-full p-4 h-full flex flex-col">
        <div :show="loading" class="flex-grow flex items-center justify-center">
            <span class="text-gray-400 text-sm animate-pulse">Loading...</span>
        </div>
        <header :show="!loading" class="mb-4 flex items-center justify-between gap-4 shrink-0">
            <div class="flex items-center gap-4 shrink-0">
                <a :attr:href="'/' + ($$project ? '?project=' + encodeURIComponent($$project) : '')" class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 transition duration-200" title="Back to Dashboard" aria-label="Back to Dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                </a>
                <h1 class="text-2xl font-bold text-indigo-600 dark:text-indigo-400" title="Lemming Task Runner">Task Log</h1>
            </div>
            <div class="text-sm font-mono text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded truncate min-w-0" :attr:title="task.description">
                {{ task.id }} &middot; {{ task.status }}
            </div>
        </header>

        <section :show="!loading" class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden flex flex-col grow min-h-0">
            <div class="py-2 px-4 border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 flex justify-between items-center shrink-0">
                <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider">{{ $.$$name }} Log</h2>
                <div class="flex items-center gap-4">
                    <div :if="task.status === 'in_progress' && task.started_at" class="hidden sm:block">
                        <span class="text-10px font-semibold uppercase text-gray-400 mr-1">Started:</span>
                        <span class="text-10px text-gray-600 dark:text-gray-400 font-mono">{{ formatDate(task.started_at) }}</span>
                    </div>
                    <div :if="task.status === 'completed' && task.completed_at" class="hidden sm:block">
                        <span class="text-10px font-semibold uppercase text-gray-400 mr-1">Completed:</span>
                        <span class="text-10px text-gray-600 dark:text-gray-400 font-mono">{{ formatDate(task.completed_at) }}</span>
                    </div>
                    <div :if="task.run_time || task.status === 'in_progress'" class="hidden sm:block">
                        <span class="text-10px font-semibold uppercase text-gray-400 mr-1">Runtime:</span>
                        <span class="text-10px text-gray-600 dark:text-gray-400 font-mono">{{ formatTaskRunTime(task) }}</span>
                    </div>
                    <div :if="task.status === 'in_progress'" class="flex items-center gap-2">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                        </span>
                        <span class="text-xs font-medium text-blue-600 uppercase tracking-wider">Live</span>
                    </div>
                </div>
            </div>
            <div class="p-4 bg-gray-900 grow overflow-hidden flex flex-col">
                <pre id="log-container" class="text-gray-100 text-[11px] font-mono leading-tight overflow-auto whitespace-pre-wrap grow">{{ taskLog || 'Loading log content...' }}</pre>
            </div>
        </section>

        <footer :show="!loading" class="mt-4 text-center shrink-0">
            <p class="text-xs text-gray-400 font-mono italic">{{ task.description }}</p>
        </footer>
    </div>

    <script>
        (async () => {
            window.ManchaApp = Mancha.initMancha({
                cloak: true,
                callback: async (renderer) => {
                    const { $ } = renderer;

                    $.task = { id: '', status: '', description: '' };
                    $.taskLog = '';
                    $.$$name = $.$$name ?? 'runner';
                    $.loading = true;

                    // --- Persistence Management (scoped by project) ---
                    const storagePrefix = $.$$project
                        ? `lemming[${$.$$project}]_`
                        : "lemming_";
                    const Storage = {
                        get(key, fallback) {
                            try {
                                const val = localStorage.getItem(storagePrefix + key);
                                return val !== null ? JSON.parse(val) : fallback;
                            } catch {
                                return fallback;
                            }
                        },
                        set(key, val) {
                            localStorage.setItem(storagePrefix + key, JSON.stringify(val));
                        },
                    };

                    $.faviconState = "idle";
                    $.lastSeenState = Storage.get("last_seen_state", null);

                    const getTaskId = () => {
                        const parts = window.location.pathname.split('/');
                        // Expected: /tasks/{task_id}/log
                        return parts[parts.length - 2];
                    };

                    $.$$project = $.$$project ?? '';
                    function logApiUrl(path) {
                        const url = new URL(path, window.location.origin);
                        if ($.$$project) url.searchParams.set('project', $.$$project);
                        return url.toString();
                    }

                    // --- Utilities ---
                    $.formatDate = (ts) => (ts ? new Date(ts * 1000).toLocaleString() : "");
                    $.formatDuration = (seconds) => {
                        if (!seconds) return "0s";
                        if (seconds < 60) return `${Math.floor(seconds)}s`;
                        const minutes = Math.floor(seconds / 60);
                        const remainingSeconds = Math.floor(seconds % 60);
                        return `${minutes}m ${remainingSeconds}s`;
                    };
                    $.formatTaskRunTime = (task) => {
                        let total = task.run_time || 0;
                        if (task.status === "in_progress" && task.last_started_at) {
                            total += Date.now() / 1000 - task.last_started_at;
                        }
                        return $.formatDuration(total);
                    };

                    $.fetchTask = async () => {
                        const taskId = getTaskId();
                        const response = await fetch(logApiUrl(`/api/tasks/${taskId}`));
                        if (response.ok) {
                            $.task = await response.json();
                            
                            // Update title: Append the top-most folder from the project path.
                            const project = $.$$project || '';
                            const folderName = project.split('/').filter(Boolean)[0];
                            if (folderName) {
                                document.title = `Lemming · Task Log · ${folderName}`;
                            } else {
                                document.title = 'Lemming · Task Log';
                            }

                            // Update favicon status
                            if (window.updateFavicon) {
                                const state = $.task.status === 'in_progress' ? 'running' : ($.task.status === 'completed' ? 'success' : ($.task.attempts > 0 ? 'error' : 'idle'));
                                
                                $.faviconState = state;

                                // If a run starts, reset the last seen state
                                if (state === "running") {
                                    $.lastSeenState = null;
                                    Storage.set("last_seen_state", null);
                                }

                                // If the current terminal state has already been seen by the user, show 'idle' favicon instead.
                                const effectiveState = (state === "success" || state === "error") && state === $.lastSeenState ? "idle" : state;
                                window.updateFavicon(effectiveState);
                            }
                        } else {
                            console.error('Failed to fetch task details');
                        }
                    };

                    $.fetchLog = async () => {
                        const taskId = getTaskId();
                        const logUrl = logApiUrl(`/api/tasks/${taskId}/log`);
                        const u = new URL(logUrl);
                        u.searchParams.set('name', $.$$name);
                        const response = await fetch(u.toString());
                        if (response.ok) {
                            const data = await response.json();
                            const newLog = data.log || 'No log available yet.';

                            // Only update if changed to avoid unnecessary re-renders
                            if (newLog !== $.taskLog) {
                                $.taskLog = newLog;
                                // Scroll to bottom on update
                                setTimeout(() => {
                                    const container = document.getElementById('log-container');
                                    if (container) container.scrollTop = container.scrollHeight;
                                }, 0);
                            }
                        }
                    };

                    $.refresh = async () => {
                        await $.fetchTask();
                        await $.fetchLog();
                        $.loading = false;
                    };

                    document.addEventListener("visibilitychange", () => {
                        if (document.visibilityState === "visible") {
                            const state = $.faviconState;
                            if (state === "success" || state === "error") {
                                $.lastSeenState = state;
                                Storage.set("last_seen_state", state);
                                if (window.updateFavicon) window.updateFavicon("idle");
                            }
                        }
                    });

                    await renderer.mount(document.body);
                    await $.refresh();
                    setInterval($.refresh, 1000);
                }
            });
        })();
    </script>
</body>
</html>
