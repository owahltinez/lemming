<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemming Dashboard</title>
    <script src="https://unpkg.com/mancha" css="utils+basic" init></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
        }
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f9fafb;
            color: #111827;
        }
        * {
            box-sizing: border-box;
        }
        @keyframes toast-in {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast {
            animation: toast-in 0.3s ease-out forwards;
            backdrop-filter: blur(8px);
        }
        .btn-primary {
            background-color: var(--primary) !important;
            color: white !important;
            transition: background-color 0.2s;
            border: none;
        }
        .btn-primary:hover {
            background-color: var(--primary-hover) !important;
        }
        .btn-icon {
            color: #4b5563 !important; /* text-gray-600 */
            transition: all 0.2s;
            border-radius: 0.375rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .btn-icon:hover {
            color: var(--primary) !important;
            background-color: #f3f4f6 !important; /* gray-100 */
        }
        .btn-icon-danger:hover {
            color: #ef4444 !important; /* text-red-500 */
            background-color: #fee2e2 !important; /* red-100 */
        }
        .rotate-180 {
            transform: rotate(180deg);
        }
    </style>
</head>
<body :data="{ tasks: [], context: '', newTask: '', loading: true, agents: [], selectedAgent: 'gemini', hideCompleted: false, toasts: [], expanded: {}, filteredTasks: $computed(() => (hideCompleted ? tasks.filter((t) => (t.status !== 'completed')) : tasks)) }">
    <div class="max-w-3xl mx-auto p-4">
        <header class="flex justify-between items-center mb-4" role="banner">
            <h1 class="text-2xl font-bold text-indigo-600" title="Lemming Dashboard">Lemming</h1>
        </header>

        <section class="mb-4 bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden" aria-labelledby="context-heading">
            <div class="py-2 px-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                <div class="flex items-center gap-4">
                    <h2 id="context-heading" class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Project Context</h2>
                </div>
                <form class="flex gap-2" :on:submit.prevent="runLemming()" aria-label="Run autonomous loop">
                    <input 
                        type="text"
                        list="agent-options"
                        :bind="selectedAgent" 
                        :on:change="saveAgentPreference()"
                        placeholder="Agent command..."
                        title="Agent command to use for the autonomous loop"
                        aria-label="Agent command"
                        class="px-2 py-1 border border-gray-300 rounded-md text-sm focus:ring-indigo-500 focus:border-indigo-500 w-64"
                    >
                    <datalist id="agent-options">
                        <option :for="agent in agents" :value="agent"></option>
                    </datalist>
                    <button type="submit" class="px-3 py-1 btn-primary rounded-md text-sm font-medium" title="Start autonomous loop" aria-label="Run Loop">
                        Run Loop
                    </button>
                </form>
            </div>
            <div class="p-4">
                <textarea 
                    :bind="context" 
                    :on:change="updateContext()"
                    class="w-full h-24 p-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 font-mono text-sm"
                    placeholder="Enter project guidelines and context..."
                    title="Project Context and Guidelines"
                    aria-label="Project context and guidelines"
                ></textarea>
            </div>
        </section>

        <section class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden" aria-labelledby="tasks-heading">
            <div class="py-2 px-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                <div class="flex items-center gap-2">
                    <h2 id="tasks-heading" class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Task Queue</h2>
                    <label class="flex items-center gap-1 cursor-pointer" title="Hide or show completed tasks">
                        <input type="checkbox" :bind="hideCompleted" :on:change="saveHideCompletedPreference()" class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500 h-3 w-3" aria-label="Hide completed tasks">
                        <span class="font-medium text-gray-500 uppercase tracking-wider" style="font-size: 10px">Hide Completed</span>
                    </label>
                </div>
                <form class="flex gap-2" :on:submit.prevent="addTask()" aria-label="Add new task">
                    <input 
                        type="text" 
                        :bind="newTask" 
                        placeholder="Task description..." 
                        title="Enter task description"
                        aria-label="New task description"
                        class="px-2 py-1 border border-gray-300 rounded-md text-sm focus:ring-indigo-500 focus:border-indigo-500 w-64"
                    >
                    <button type="submit" class="px-3 py-1 btn-primary rounded-md text-sm font-medium" title="Add new task" aria-label="Add task">
                        Add Task
                    </button>
                </form>
            </div>
            
            <div class="divide-y divide-gray-200" role="list">
                <div :for="task in filteredTasks" :key="task.id" class="flex flex-col hover:bg-gray-50/50 transition-colors" role="listitem">
                    <div class="py-1 px-4 flex items-center justify-between" :aria-label="'Task: ' + task.description" :title="'Task: ' + task.description">
                        <div class="flex items-center gap-2 overflow-hidden">
                            <button 
                                :on:click="expanded[task.id] = !expanded[task.id]" 
                                class="p-1 btn-icon" 
                                :title="expanded[task.id] ? 'Hide details' : 'Show details'"
                                :aria-label="expanded[task.id] ? 'Hide details' : 'Show details'"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 transition-transform" :class="expanded[task.id] ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                                </svg>
                            </button>
                            <span 
                                class="w-2.5 h-2.5 rounded-full flex-shrink-0" 
                                :class="task.status === 'completed' ? 'bg-green-500' : (task.status === 'in_progress' ? 'bg-blue-500 animate-pulse' : 'bg-yellow-400')"
                                role="img"
                                :aria-label="task.status === 'completed' ? 'Completed' : (task.status === 'in_progress' ? 'In Progress' : 'Pending')"
                                :title="task.status === 'completed' ? 'Status: Completed' : (task.status === 'in_progress' ? 'Status: In Progress' : 'Status: Pending')"
                            ></span>
                            <div class="overflow-hidden">
                                <p class="text-sm font-medium truncate" :class="task.status === 'completed' ? 'text-gray-400 line-through' : (task.status === 'in_progress' ? 'text-blue-600' : 'text-gray-900')" :title="task.description">
                                    {{ task.description }}
                                </p>
                                <p class="text-gray-400 font-mono uppercase" style="font-size: 10px" :aria-label="'Task ID ' + task.id + ', ' + task.attempts + ' attempts'" title="Task ID and number of attempts">
                                    {{ task.id }} &middot; Attempts: {{ task.attempts }}
                                </p>
                            </div>
                        </div>
                        <div class="flex gap-1">
                            <button 
                                :show="task.status === 'in_progress'"
                                :on:click="cancelTask(task.id)" 
                                class="p-1 btn-icon btn-icon-danger"
                                title="Cancel Task Execution"
                                aria-label="Cancel Task Execution"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H10a1 1 0 01-1-1v-4z" />
                                </svg>
                            </button>
                            <button 
                                :on:click="toggleTaskStatus(task)" 
                                class="p-1 btn-icon"
                                :title="task.status === 'completed' ? 'Mark as Pending' : 'Mark as Completed'"
                                :aria-label="task.status === 'completed' ? 'Mark as Pending' : 'Mark as Completed'"
                            >
                                <svg :show="task.status !== 'completed'" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true" role="img">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                                </svg>
                                <svg :show="task.status === 'completed'" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true" role="img">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                </svg>
                            </button>
                            <button :on:click="deleteTask(task.id)" class="p-1 btn-icon btn-icon-danger" title="Delete Task" aria-label="Delete Task">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true" role="img">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Task Details -->
                    <div :show="expanded[task.id]" class="px-12 pb-3 text-xs text-gray-600 border-t border-gray-100 bg-gray-50/50">
                        <div class="mt-2 grid grid-cols-2 gap-4">
                            <div :if="task.agent">
                                <span class="font-semibold uppercase text-gray-400 block mb-1" style="font-size: 9px">Custom Agent:</span>
                                <span class="font-mono bg-gray-200 px-1 rounded">{{ task.agent }}</span>
                            </div>
                            <div :if="task.pid">
                                <span class="font-semibold uppercase text-gray-400 block mb-1" style="font-size: 9px">Process PID:</span>
                                <span class="font-mono">{{ task.pid }}</span>
                            </div>
                        </div>
                        <div :if="task.lessons && task.lessons.length > 0" class="mt-3">
                            <span class="font-semibold uppercase text-gray-400 block mb-1" style="font-size: 9px">Outcomes & Lessons Learned:</span>
                            <ul class="list-disc ml-4 space-y-1">
                                <li :for="lesson in task.lessons" class="text-gray-700">{{ lesson }}</li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div :show="tasks.length === 0" class="p-8 text-center text-gray-500 text-sm" role="status" title="No tasks available">
                    No tasks yet. Add one to get started!
                </div>
            </div>
        </section>
    </div>

    <div class="fixed bottom-4 right-4 flex flex-col gap-2 z-50 pointer-events-none" role="log" aria-live="polite">
        <div :for="toast in toasts" :key="toast.id" class="toast px-4 py-2 rounded-lg shadow-lg text-white text-sm pointer-events-auto min-w-48 max-w-xs flex justify-between items-center gap-3 transition-all duration-300" :class="toast.type === 'success' ? 'bg-green-600/70' : (toast.type === 'error' ? 'bg-red-600/70' : 'bg-indigo-600/70')" role="alert">
            <span class="truncate flex-1 min-w-0" :aria-label="toast.message" :title="toast.message">{{ toast.message }}</span>
            <button :on:click="toasts = toasts.filter((t) => (t.id !== toast.id))" class="text-white hover:text-gray-200 font-bold flex-shrink-0" title="Dismiss notification" aria-label="Dismiss notification">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>
    </div>

    <script>
        const { $ } = Mancha;

        $.addToast = function(message, type = 'info') {
            const id = Date.now() + Math.random();
            this.toasts.push({ id, message, type });
            setTimeout(() => {
                this.toasts = this.toasts.filter((t) => (t.id !== id));
            }, 5000);
        };

        $.fetchData = async function() {
            const response = await fetch('/api/data');
            const data = await response.json();
            
            // Detect changes for toasts if this isn't the first load
            if (this.tasks.length > 0) {
                const oldTaskMap = new Map(this.tasks.map(t => [t.id, t]));
                data.tasks.forEach((newTask) => {
                    const oldTask = oldTaskMap.get(newTask.id);
                    if (oldTask) {
                        if (oldTask.status !== 'completed' && newTask.status === 'completed') {
                            this.addToast(`Task completed: ${newTask.description}`, 'success');
                        } else if (newTask.lessons.length > oldTask.lessons.length && newTask.status !== 'completed') {
                            this.addToast(`Task failed: ${newTask.description}`, 'error');
                        } else if (newTask.attempts > oldTask.attempts) {
                            this.addToast(`Task attempt ${newTask.attempts}: ${newTask.description}`, 'info');
                        }
                    }
                });
            }

            // Load hideCompleted preference if it's the first time
            if (this.loading) {
                const savedHide = localStorage.getItem('lemming_hide_completed');
                if (savedHide !== null) {
                    this.hideCompleted = savedHide === 'true';
                }
            }

            this.tasks = data.tasks;
            
            // Only update context if the textarea is not focused to avoid overwriting while typing
            const contextElem = document.querySelector('textarea');
            if (document.activeElement !== contextElem) {
                this.context = data.context;
            }
            
            this.loading = false;
        };

        $.fetchAgents = async function() {
            const response = await fetch('/api/agents');
            this.agents = await response.json();
            
            // Load preference
            const savedAgent = localStorage.getItem('lemming_selected_agent');
            if (savedAgent) {
                this.selectedAgent = savedAgent;
            }
        };

        $.saveAgentPreference = function() {
            localStorage.setItem('lemming_selected_agent', this.selectedAgent);
        };

        $.saveHideCompletedPreference = function() {
            localStorage.setItem('lemming_hide_completed', this.hideCompleted);
        };

        $.addTask = async function() {
            if (!this.newTask.trim()) return;
            const response = await fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ description: this.newTask })
            });
            if (response.ok) {
                this.newTask = '';
                await this.fetchData();
            }
        };

        $.deleteTask = async function(id) {
            if (!confirm('Are you sure you want to delete this task?')) return;
            const response = await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
            if (response.ok) await this.fetchData();
        };

        $.cancelTask = async function(id) {
            if (!confirm('Are you sure you want to cancel this task execution? The associated process will be killed.')) return;
            const response = await fetch(`/api/tasks/${id}/cancel`, { method: 'POST' });
            if (response.ok) {
                this.addToast('Task execution cancelled', 'info');
                await this.fetchData();
            }
        };

        $.toggleTaskStatus = async function(task) {
            const newStatus = task.status === 'completed' ? 'pending' : 'completed';
            const response = await fetch(`/api/tasks/${task.id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });
            if (response.ok) await this.fetchData();
        };

        $.updateContext = async function() {
            await fetch('/api/context', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ context: this.context })
            });
        };

        $.runLemming = async function() {
            if (!confirm(`Start the autonomous loop with ${this.selectedAgent}? This will run Lemming in the background.`)) return;
            const response = await fetch('/api/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ agent: this.selectedAgent })
            });
            if (response.ok) alert('Lemming run started!');
        };

        // Initial fetch
        $.fetchData();
        $.fetchAgents();

        // Auto-refresh every 3 seconds
        setInterval(() => ($.fetchData()), 3000);
    </script>
</body>
</html>
