<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemming</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐹</text></svg>">
    <script src="/static/mancha.js" css="utils"></script>
    <script src="/static/favicon.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-gray-100 font-sans">
    <div class="max-w-4xl mx-auto p-4">
        <header class="mb-4 flex items-center justify-between gap-4">
            <div class="flex items-center gap-4 shrink-0">
                <a :attr:href="'/' + ($$project ? '?project=' + encodeURIComponent($$project) : '')" class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 transition duration-200" title="Back to Dashboard" aria-label="Back to Dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                </a>
                <h1 class="text-2xl font-bold text-indigo-600 dark:text-indigo-400" title="Lemming Task Runner">Lemming Task Runner</h1>
            </div>
            <div class="text-sm font-mono text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-900 px-2 py-1 rounded truncate min-w-0" :attr:title="'/' + path">
                /{{ path }}
            </div>
        </header>

        <section class="bg-white dark:bg-gray-900 rounded-lg shadow-sm border border-gray-200 dark:border-gray-600 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 dark:bg-gray-800 border-b border-gray-200 dark:border-gray-600">
                        <tr>
                            <th class="px-4 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Name</th>
                            <th class="px-4 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider w-32">Size</th>
                            <th class="px-4 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider w-48">Last Modified</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white dark:bg-gray-900">
                        <tr :if="path" class="border-b border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                            <td class="px-4 py-2" colspan="3">
                                <a :attr:href="'/files/' + path.split('/').slice(0, -1).join('/')" class="text-indigo-600 hover:text-indigo-800 font-medium flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" />
                                    </svg>
                                    .. / Parent Directory
                                </a>
                            </td>
                        </tr>
                        <tr :for="item in contents" class="border-b border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                            <td class="px-4 py-2">
                                <a :attr:href="'/files/' + item.path" :attr:class="'flex items-center gap-2 ' + (item.is_dir ? 'text-indigo-600 font-medium' : 'text-gray-700 dark:text-gray-300')" :attr:target="item.is_dir ? '' : '_blank'">
                                    <svg :if="item.is_dir" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                                    </svg>
                                    <svg :if="!item.is_dir" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                                    </svg>
                                    {{ item.name }}
                                </a>
                            </td>
                            <td class="px-4 py-2 text-sm text-gray-500 font-mono">
                                {{ formatSize(item.size) }}
                            </td>
                            <td class="px-4 py-2 text-sm text-gray-500">
                                {{ formatDate(item.modified) }}
                            </td>
                        </tr>
                        <tr :if="!loading && contents.length === 0">
                            <td class="px-4 py-8 text-center text-gray-500 text-sm" colspan="3">
                                This directory is empty.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        (async () => {
window.ManchaApp = Mancha.initMancha({
                cloak: true,
                callback: async (renderer) => {
                    const { $ } = renderer;

                    $.path = '';
                    $.contents = [];
                    $.loading = true;
                    $.$$project = $.$$project ?? '';

                    $.formatSize = (bytes) => {
                        if (bytes === null || bytes === undefined) return '';
                        if (bytes === 0) return '0 B';
                        const k = 1024;
                        const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
                        const i = Math.floor(Math.log(bytes) / Math.log(k));
                        return `${parseFloat((bytes / Math.pow(k, i)).toFixed(2))} ${sizes[i]}`;
                    };

                    $.formatDate = (ts) => {
                        return ts ? new Date(ts * 1000).toLocaleString() : '';
                    };

                    $.fetchFiles = async () => {
                        // Extract path from URL: /files/some/path -> some/path
                        const pathname = window.location.pathname;
                        const path = pathname.replace(/^\/files\/?/, '').replace(/\/$/, '');
                        
                        const response = await fetch(`/api/files/${path}`);
                        if (response.ok) {
                            const data = await response.json();
                            $.path = data.path;
                            $.contents = data.contents;
                        } else {
                            console.error('Failed to fetch files');
                        }
                        $.loading = false;
                    };

                    await $.fetchFiles();
                    
                    if (window.updateFavicon) {
                        window.updateFavicon('idle');
                    }

                    await renderer.mount(document.body);
                }
            });
        })();
    </script>
</body>
</html>
